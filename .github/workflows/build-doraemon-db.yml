name: Build Doraemon Database

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Build database
        env:
          DORAEMON_SITE_URL: https://doraemon-hindi-1979.netlify.app
          MANGA_SHEET_URL: ${{ secrets.MANGA_SHEET_URL }}
        run: |
          python scraper/anime_scraper.py --url "$DORAEMON_SITE_URL"
          python scraper/manga_scraper.py --csv-url "$MANGA_SHEET_URL"
          python scripts/merge_database.py

      - name: Commit changes
        run: |
          git add database/

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "Update Doraemon database - $(date '+%Y-%m-%d %H:%M')"
          git push

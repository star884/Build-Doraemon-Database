name: Build Doraemon Database

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *" # daily

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
  run: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt

      - name: Build database
        env:
          DORAEMON_SITE_URL: https://doraemon-hindi-1979.netlify.app/#classic
          MANGA_SHEET_URL: https://docs.google.com/spreadsheets/u/0/d/1wU1Yx4GWAuTviPtTvHlEljmul7W6hlNPEM_IGM25GX0/htmlview?pli=1
        run: |
          python scripts/build_doraemon_db.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add database
          git commit -m "Update Doraemon database"
          git push
